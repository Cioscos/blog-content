name: Update blog index

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Generate index.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const postsDir = path.join(__dirname, 'posts');
          const files = fs.readdirSync(postsDir).filter(f => f.endsWith('.md'));
          const entries = [];

          for (const file of files) {
            const raw = fs.readFileSync(path.join(postsDir, file), 'utf-8');
            const match = raw.match(/^---\n([\s\S]*?)\n---/);
            if (!match) continue;

            const filename = file.replace('.md', '');
            const lastDot = filename.lastIndexOf('.');
            if (lastDot === -1) continue;

            const slug = filename.slice(0, lastDot);
            const lang = filename.slice(lastDot + 1);
            const frontBlock = match[1];
            const data = {};

            for (const line of frontBlock.split('\n')) {
              const colonIdx = line.indexOf(':');
              if (colonIdx === -1) continue;
              const key = line.slice(0, colonIdx).trim();
              let value = line.slice(colonIdx + 1).trim();
              if (value.startsWith('\"') && value.endsWith('\"')) value = value.slice(1, -1);
              if (value.startsWith('[') && value.endsWith(']')) {
                value = value.slice(1, -1).split(',').map(s => s.trim().replace(/^\"|\"$/g, ''));
              }
              if (typeof value === 'string' && /^\d+$/.test(value)) value = parseInt(value, 10);
              data[key] = value;
            }

            entries.push({
              slug,
              lang,
              title: data.title || '',
              date: data.date || '',
              excerpt: data.excerpt || '',
              tags: Array.isArray(data.tags) ? data.tags : [],
              readTime: typeof data.readTime === 'number' ? data.readTime : 0
            });
          }

          entries.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
          fs.writeFileSync('index.json', JSON.stringify(entries, null, 2) + '\n');
          console.log('Generated index.json with', entries.length, 'entries');
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "chore: regenerate index.json" && git push
